spring.application.name=GoRide

# Load local API keys (Gemini, Resend) — see application-local.properties
spring.config.import=optional:classpath:application-local.properties

# =============================================
# Configuration MySQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/goride_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# =============================================
# Configuration JPA / Hibernate
# =============================================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# =============================================
# Serveur
# =============================================
server.port=8081

# =============================================
# JWT (JSON Web Token)
# =============================================
# Clé secrète encodée en Base64 (256 bits minimum pour HS256)
app.jwt.secret=R29SaWRlU2VjcmV0S2V5UEZFMjAyNlZlcnlMb25nQW5kU2VjdXJlMjU2Qml0c01pbmltdW0h
# Durée de validité du token : 24 heures (en millisecondes)
app.jwt.expiration=86400000

# =============================================
# URL de base de l'application (utilisée dans les emails)
# =============================================
app.base-url=http://localhost:4200

# Email via Resend (https://resend.com/api-keys) — set API key in application-local.properties
goride.mail.enabled=true
goride.mail.provider=resend
resend.from=GoRide <onboarding@resend.dev>
resend.api-key=${RESEND_API_KEY:}
# false = e-mails envoyés directement à l'utilisateur (inscription, reset, notifications)
goride.mail.dev-redirect-all=${GORIDE_MAIL_DEV_REDIRECT_ALL:false}
goride.mail.dev-redirect-to=${GORIDE_MAIL_DEV_REDIRECT:}
goride.mail.try-smtp-fallback=${GORIDE_MAIL_SMTP_FALLBACK:true}
# Forgot-password: never expose resetLink in API (email only — security)
goride.dev.expose-reset-link=${GORIDE_DEV_EXPOSE_RESET_LINK:false}

# Demo data: minimum rentable vehicles and trips on startup (see DataSeeder)
goride.demo.seed-min-vehicles=12

# Uploaded vehicle photos (served at /vehicle-photos/**)
goride.upload.vehicle-photos-dir=./data/uploads/vehicle-photos

# Optional Google Maps API key (server-side geocoding only; maps UI uses Leaflet + OSM by default)
goride.maps.api-key=${GORIDE_GOOGLE_MAPS_API_KEY:}

# AI assistant — smart = rules+DB fallback. auto/gemini = Google Gemini when key is set (https://aistudio.google.com/apikey)
goride.ai.provider=${GORIDE_AI_PROVIDER:gemini}
goride.ai.gemini-api-key=${GORIDE_GEMINI_API_KEY:}
goride.ai.gemini-model=${GORIDE_GEMINI_MODEL:gemini-2.0-flash}

# =============================================
# Logging
# =============================================
logging.level.com.pfeproject.GoRide=DEBUG
logging.level.org.springframework.security=DEBUG
# =============================================
# Configuration Email (Gmail SMTP - Final)
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GORIDE_MAIL_USERNAME:}
spring.mail.password=${GORIDE_MAIL_PASSWORD:}

# Contact form destination (override in application-local.properties)
goride.contact.to=${GORIDE_CONTACT_EMAIL:}

# Propriétés techniques SMTP
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=true
spring.mail.properties.mail.debug=true

# Timeouts pour éviter de bloquer l'application
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Activer le debug pour voir les échanges dans la console (optionnel)
spring.mail.properties.mail.debug=true
