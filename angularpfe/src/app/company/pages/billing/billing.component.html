<div class="billing-page">
  <div class="row g-4 mb-4">
    <div class="col-md-6">
      <div class="content-card shadow-sm bg-white rounded-4 p-4 h-100">
        <h5 class="fw-bold mb-4">État du Compte Corporate</h5>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <span class="text-muted small d-block">Crédit restant</span>
            <h2 class="fw-bold text-indigo">2,450.00 DT</h2>
          </div>
          <button class="btn btn-indigo text-white rounded-pill px-4 fw-bold">Recharger</button>
        </div>
        <div class="alert bg-light border-0 rounded-4">
          <span class="ion-ios-information-circle text-indigo me-2"></span>
          <span class="small">Votre budget sera automatiquement renouvelé le **1er Juin**.</span>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="content-card shadow-sm bg-white rounded-4 p-4 h-100">
        <h5 class="fw-bold mb-4">Méthode de Paiement</h5>
        <div class="d-flex align-items-center gap-3 p-3 border rounded-4">
          <div class="bg-light p-2 rounded-3">
            <span class="ion-ios-card fs-3 text-indigo"></span>
          </div>
          <div class="flex-grow-1">
            <span class="fw-bold d-block small">VISA Corporate</span>
            <span class="text-muted tiny">**** **** **** 5580</span>
          </div>
          <button class="btn btn-sm btn-light border">Modifier</button>
        </div>
      </div>
    </div>
  </div>

  <div class="content-card shadow-sm bg-white rounded-4 overflow-hidden">
    <div class="card-header p-3 border-bottom">
      <h5 class="mb-0 fw-bold">Dernières Factures</h5>
    </div>
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
          <tr>
            <th class="ps-4">N° Facture</th>
            <th>Période</th>
            <th>Date d'émission</th>
            <th>Montant</th>
            <th class="text-end pe-4">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="ps-4"><span class="fw-bold small">INV-2026-04</span></td>
            <td><span class="small">Avril 2026</span></td>
            <td><span class="small">01 Mai 2026</span></td>
            <td><span class="fw-bold small">1,245.00 DT</span></td>
            <td class="text-end pe-4">
              <button class="btn btn-sm btn-outline-indigo rounded-pill px-3">Télécharger</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
