<header class="topbar">
  <div class="topbar-left">
    <h1 class="page-title">{{ getPageTitle() }}</h1>
  </div>

  <div class="topbar-right">
    <div class="search-box d-none d-md-flex" style="position: relative;">
      <span class="ion-ios-search icon"></span>
      <input
        type="text"
        placeholder="Chercher un collaborateur, une facture..."
        [(ngModel)]="searchQuery"
        (input)="onSearchInput()"
        (keydown.enter)="onSearchSubmit()"
        (blur)="closeSearchDropdown()">

      <div *ngIf="showSearchDropdown" class="search-dropdown-menu" (mousedown)="$event.preventDefault()">
        <div *ngIf="isSearching" class="search-dropdown-loading">Recherche en cours...</div>
        <div *ngIf="!isSearching && !hasSearchResults()" class="search-dropdown-empty">Aucun résultat</div>
        <div *ngIf="!isSearching && hasSearchResults()">
          <div *ngIf="searchResults?.requests?.length" class="search-results-section">
            <div class="section-title">Demandes</div>
            <div *ngFor="let r of searchResults!.requests" class="search-item" (mousedown)="openRequest(r)">
              <span class="item-name">{{ r.label }}</span>
              <span class="item-meta">{{ r.meta }}</span>
            </div>
          </div>
          <div *ngIf="searchResults?.conversations?.length" class="search-results-section">
            <div class="section-title">Messages</div>
            <div *ngFor="let c of searchResults!.conversations" class="search-item" (mousedown)="openConversation(c)">
              <span class="item-name">{{ c.label }}</span>
              <span class="item-meta">{{ c.meta }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <button class="icon-btn" (click)="goToNotifications()">
      <span class="ion-ios-notifications-outline"></span>
      <span class="notification-dot" *ngIf="unreadNotificationsCount > 0"></span>
    </button>

    <div class="user-profile-container">
      <div class="user-profile" (click)="toggleDropdown()">
        <div class="avatar-wrapper position-relative">
          <app-profile-avatar [firstName]="currentUser?.firstName" [lastName]="currentUser?.lastName" [photoUrl]="currentUser?.photoUrl" [size]="40"></app-profile-avatar>
          <div class="status-online" style="position:absolute;bottom:0;right:0;width:10px;height:10px;background:#10b981;border-radius:50%;border:2px solid white;z-index:10;"></div>
        </div>
        <div class="user-info d-none d-md-block">
          <span class="user-name">{{ currentUserFullName }}</span>
          <span class="user-role text-indigo">Corporate Manager</span>
        </div>
        <span class="ion-ios-arrow-down arrow-icon"></span>
      </div>

      <!-- Dropdown Menu -->
      <div class="dropdown-menu-custom shadow-lg" *ngIf="isUserDropdownOpen">
        <div class="dropdown-header px-3 py-2 border-bottom">
           <span class="text-muted small fw-bold">BASCIULER LE MODE</span>
        </div>
        <div class="role-list p-2">
          <button 
            *ngFor="let role of availableRoles" 
            class="role-item btn w-100 text-start d-flex align-items-center gap-2 mb-1"
            [class.active]="role.id === authService.getActiveRole()"
            (click)="switchRole(role.id, role.route)"
          >
            <span [class]="role.icon" [style.color]="role.color"></span>
            <span>{{ role.label }}</span>
            <span class="ms-auto ion-ios-checkmark-circle" *ngIf="role.id === authService.getActiveRole()"></span>
          </button>
        </div>
        <div class="dropdown-divider"></div>
        <a class="dropdown-item" (click)="goToHome($event)" style="cursor: pointer;">
          <span class="ion-ios-home-outline"></span> Accueil
        </a>
        <a class="dropdown-item" (click)="goToProfile($event)" style="cursor: pointer;">
          <span class="ion-ios-person-outline"></span> Mon Profil
        </a>
        <a class="dropdown-item" (click)="goToSettings($event)" style="cursor: pointer;">
          <span class="ion-ios-settings-outline"></span> Paramètres
        </a>
        <div class="dropdown-divider"></div>
        <a class="dropdown-item text-danger" (click)="authService.logout()">
          <span class="ion-ios-log-out text-danger"></span> Déconnexion
        </a>
      </div>
    </div>
  </div>
</header>
