<div class="setup-container">
  <div class="setup-card shadow-lg">
    <div class="mb-4">
      <app-logo [roleBadge]="'PROPRIÉTAIRE'"></app-logo>
    </div>
    <div class="setup-header text-center mb-5">
      <div class="step-indicator mb-3">
        <span class="step-dot completed"></span>
        <span class="step-line active"></span>
        <span class="step-dot active">2</span>
      </div>
      <h2 class="fw-800">{{ 'FLEET_SETUP.TITLE' | translate }}</h2>
      <p class="text-muted">{{ 'FLEET_SETUP.SUBTITLE' | translate }}</p>
    </div>

    <div *ngIf="successMessage" class="alert alert-success py-3 text-center rounded-4 mb-4" role="alert">
      <span class="ion-ios-checkmark-circle me-2"></span> {{ successMessage }}
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger py-3 text-center rounded-4 mb-4" role="alert">
      <span class="ion-ios-close-circle me-2"></span> {{ errorMessage }}
    </div>

    <form [formGroup]="vehicleForm" (ngSubmit)="onSubmit()" *ngIf="!successMessage">
      <div class="row g-4">
        <!-- Personal & Company Info -->
        <div class="col-md-6">
          <label class="form-label-custom">{{ 'SIGNUP.FIRST_NAME' | translate }}</label>
          <input type="text" class="form-control-custom" formControlName="firstName" [placeholder]="'SIGNUP.FIRST_NAME' | translate">
        </div>
        <div class="col-md-6">
          <label class="form-label-custom">{{ 'SIGNUP.LAST_NAME' | translate }}</label>
          <input type="text" class="form-control-custom" formControlName="lastName" [placeholder]="'SIGNUP.LAST_NAME' | translate">
        </div>
        <div class="col-12">
          <label class="form-label-custom">{{ 'FLEET_SIGNUP.COMPANY_NAME' | translate }}</label>
          <input type="text" class="form-control-custom" formControlName="companyName" placeholder="Ex: Ma Flotte Transport">
        </div>

        <!-- Brand & Model -->
        <div class="col-md-6">
          <label class="form-label-custom">{{ 'FLEET_SETUP.BRAND' | translate }}</label>
          <input type="text" class="form-control-custom" formControlName="brand" placeholder="Ex: Toyota">
        </div>
        <div class="col-md-6">
          <label class="form-label-custom">{{ 'FLEET_SETUP.MODEL' | translate }}</label>
          <input type="text" class="form-control-custom" formControlName="model" placeholder="Ex: Corolla">
        </div>

        <!-- Year & Category -->
        <div class="col-md-6">
          <label class="form-label-custom">{{ 'FLEET_SETUP.YEAR' | translate }}</label>
          <input type="number" class="form-control-custom" formControlName="year" placeholder="2022">
        </div>
        <div class="col-md-6">
          <label class="form-label-custom">{{ 'FLEET_SETUP.CATEGORY' | translate }}</label>
          <select class="form-select-custom" formControlName="category">
            <option value="" disabled selected>{{ 'FLEET_SETUP.SELECT_CATEGORY' | translate }}</option>
            <option *ngFor="let cat of categories" [value]="cat.value">{{ cat.label }}</option>
          </select>
        </div>

        <!-- License Plate & Color -->
        <div class="col-md-6">
          <label class="form-label-custom">{{ 'FLEET_SETUP.PLATE' | translate }}</label>
          <input type="text" class="form-control-custom text-uppercase" formControlName="licensePlate" placeholder="123 TUN 4567">
          <small class="text-muted">Format: 123 TUN 4567 ou 123 TU 456789</small>
        </div>
        <div class="col-md-6">
          <label class="form-label-custom">{{ 'FLEET_SETUP.COLOR' | translate }}</label>
          <input type="text" class="form-control-custom" formControlName="color" placeholder="Ex: Noir Métallisé">
        </div>

        <!-- Fuel & Seats -->
        <div class="col-md-6">
          <label class="form-label-custom">{{ 'FLEET_SETUP.FUEL' | translate }}</label>
          <select class="form-select-custom" formControlName="fuelType">
            <option value="" disabled selected>{{ 'FLEET_SETUP.SELECT_FUEL' | translate }}</option>
            <option *ngFor="let fuel of fuelTypes" [value]="fuel.value">{{ fuel.label }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label-custom">{{ 'FLEET_SETUP.SEATS' | translate }}</label>
          <input type="number" class="form-control-custom" formControlName="seats">
        </div>
      </div>

      <div class="actions mt-5 d-flex gap-3">
        <button type="button" class="btn btn-skip flex-grow-1 py-3" (click)="skip()">
          {{ 'FLEET_SETUP.SKIP' | translate }}
        </button>
        <button type="submit" class="btn btn-primary-setup flex-grow-2 py-3" [disabled]="vehicleForm.invalid || isSubmitting">
          <span *ngIf="!isSubmitting">{{ 'FLEET_SETUP.SUBMIT' | translate }}</span>
          <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2"></span>
        </button>
      </div>
    </form>
  </div>
</div>
