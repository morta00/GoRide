<div class="placeholder-container animate__animated animate__fadeIn">
  <div class="placeholder-card">
    <div class="icon-wrapper">
      <span [class]="icon"></span>
    </div>
    <h2 class="placeholder-title">{{ title }}</h2>
    <p class="placeholder-desc">
      Cette section administrateur sera finalisée dans les prochaines étapes.
    </p>
    
    <div class="placeholder-actions">
      <a routerLink="/admin/dashboard" class="btn btn-primary">
        <span class="ion-ios-arrow-back me-2"></span>
        Retour au tableau de bord
      </a>
    </div>
  </div>
</div>
